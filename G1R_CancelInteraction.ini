; G1R Cancel Interaction 0.8.6
; The four native options also appear under:
; Settings (Einstellungen) -> Mods -> G1R Cancel Interaction
; Changes made there apply immediately and PleasureLib saves them to this file.
; This INI remains the manual fallback. Debug and CancelKeys are INI-only.
; Keyboard and mouse key names are comma-separated.
Debug=false

; Allow cancellation while approaching benches and ladders.
EnableBenchAndLadderCancellation=true

; Allow player-started conversations to be cancelled before dialogue opens.
EnableConversationCancellation=true

; Allow configured A, W, S, and D keys to trigger cancellation.
EnableWASDCancellation=true

; Mining cancellation is always available.
; false (default): cancelling gives no ore and shows no ore notification.
; true: cancelling still gives ore and shows its notification.
; If safe ore removal is unavailable, cancellation still works and the game
; may keep the reward; see the UE4SS log.
; Legacy EnableMiningCancellation is read only when this key is missing.
KeepOreOnMiningCancellation=false

CancelKeys=F,R,ESCAPE,A,W,S,D,RIGHT_MOUSE_BUTTON
