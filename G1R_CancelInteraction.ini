; G1R Cancel Interaction
; DiscoveryMode=true logs candidate interaction hooks for troubleshooting.
; ControllerCancelKeys feeds controller diagnostics and EnhancedInput matching.
; Normal controller cancel also listens to the game's AbilitySystem Cancel input.
DiscoveryMode=false
Debug=false
CancelKeys=ESCAPE,A,W,S,D,RIGHT_MOUSE_BUTTON
ControllerCancelEnabled=true
ControllerCancelKeys=CONTROLLER_FACE_RIGHT
CooldownMs=250
