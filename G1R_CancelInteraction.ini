; G1R Cancel Interaction
; DiscoveryMode=true logs candidate interaction hooks for troubleshooting.
; ControllerCancelKeys feeds mapped EnhancedInput controller matching.
; AbilitySystem input hooks stay registered as a quiet fallback.
DiscoveryMode=false
Debug=false
CancelKeys=ESCAPE,A,W,S,D,RIGHT_MOUSE_BUTTON
ControllerCancelEnabled=true
ControllerCancelKeys=CONTROLLER_FACE_RIGHT,CONTROLLER_FACE_BOTTOM
CooldownMs=250
